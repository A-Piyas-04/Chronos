services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    env_file:
      - ./.env
      - ./apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app

  worker:
    build:
      context: ./apps/worker
    env_file:
      - ./.env
      - ./apps/worker/.env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/worker:/app

  web:
    build:
      context: ./apps/web
    env_file:
      - ./.env
      - ./apps/web/.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules

volumes:
  postgres_data:
  web_node_modules:
